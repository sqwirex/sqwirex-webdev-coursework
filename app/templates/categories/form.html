{% extends 'base.html' %}
{% block title %}Категория{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{% if category %}Редактирование категории{% else %}Создание категории{% endif %}</h1>
<form method="post" class="card card-body">
    <div class="mb-3">
        <label class="form-label">Название</label>
        <input type="text" name="name" class="form-control" value="{{ category.name if category else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Описание</label>
        <textarea name="description" class="form-control" rows="4">{{ category.description if category else '' }}</textarea>
    </div>
    <div>
        <button class="btn btn-success" type="submit">Сохранить</button>
        <a class="btn btn-secondary" href="{{ url_for('categories_list') }}">Назад</a>
    </div>
</form>
{% endblock %}
