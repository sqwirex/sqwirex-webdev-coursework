{% extends 'base.html' %}
{% block title %}Пользователь{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{% if user_obj %}Редактирование пользователя{% else %}Создание пользователя{% endif %}</h1>
<form method="post" class="card card-body">
    <div class="mb-3">
        <label class="form-label">Логин</label>
        <input type="text" name="username" class="form-control" value="{{ user_obj.username if user_obj else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">ФИО</label>
        <input type="text" name="full_name" class="form-control" value="{{ user_obj.full_name if user_obj else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Пароль {% if user_obj %}(оставьте пустым, чтобы не менять){% endif %}</label>
        <input type="password" name="password" class="form-control" {% if not user_obj %}required{% endif %}>
    </div>
    <div class="mb-3">
        <label class="form-label">Роль</label>
        <select name="role_id" class="form-select" required>
            {% for role in roles %}
                <option value="{{ role.id }}" {% if user_obj and user_obj.role_id == role.id %}selected{% endif %}>{{ role.description }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <button class="btn btn-success" type="submit">Сохранить</button>
        <a class="btn btn-secondary" href="{{ url_for('users_list') }}">Назад</a>
    </div>
</form>
{% endblock %}
